services:
  ai-call-center-demo:
    build: .
    ports:
      - "4173:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REALTIME_MODEL: ${REALTIME_MODEL:-gpt-realtime}
      HANDOFF_STORE_PATH: /app/data/realtime-handoffs.json
    volumes:
      - ./data:/app/data
